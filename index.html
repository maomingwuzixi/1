<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>吴梓锡 - 制造业HR个人主页</title>
<link rel="stylesheet" href="https://cdn.bootcdn.net/ajax/libs/font-awesome/6.4.0/css/all.min.css">
<style>
/* 全局样式重置 */
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    font-family: "Microsoft YaHei", sans-serif;
}
/* 颜色变量（统一风格） */
:root {
    --primary: #f97316; /* 主色调：橙色 */
    --bg: #f8fafc;       /* 背景色：浅灰 */
    --card: #ffffff;     /* 卡片底色：白色 */
    --text: #333333;     /* 正文色：深灰 */
    --light-text: #64748b; /* 浅文本色：灰蓝 */
}
/* 页面基础样式 */
body {
    background-color: var(--bg);
    padding: 3rem 1rem; /* 上下3rem，左右1rem内边距 */
}
/* 容器（居中+限制宽度） */
.container {
    max-width: 1000px; /* 最大宽度，适配电脑 */
    margin: 0 auto;    /* 水平居中 */
    text-align: center; /* 内容居中 */
}
/* 头部标题样式 */
.header {
    margin-bottom: 4rem; /* 和下面板块拉开距离 */
}
.header h1 {
    font-size: 2.5rem;
    color: var(--primary);
    margin-bottom: 1rem;
}
.header p {
    font-size: 1.2rem;
    color: var(--light-text);
}
/* 三大板块入口卡片容器 */
.section-links {
    display: grid;
    grid-template-columns: repeat(3, 1fr); /* 一行3个卡片 */
    gap: 2rem; /* 卡片之间的间距 */
    margin-top: 3rem;
}
/* 单个卡片样式 */
.section-card {
    background-color: var(--card);
    padding: 3rem 2rem; /* 内边距，让卡片饱满 */
    border-radius: 12px; /* 圆角 */
    text-decoration: none; /* 去掉链接下划线 */
    color: var(--text); /* 文字色 */
    transition: all 0.3s ease; /* hover动画过渡 */
    box-shadow: 0 4px 10px rgba(0,0,0,0.05); /* 轻微阴影 */
}
/* 卡片hover效果（鼠标放上去） */
.section-card:hover {
    transform: translateY(-8px); /* 向上移8px */
    box-shadow: 0 8px 20px rgba(0,0,0,0.1); /* 阴影变大 */
    background-color: #fef3c7; /* 背景变浅橙 */
    border: 1px solid var(--primary); /* 加边框 */
}
/* 卡片里的图标 */
.section-card i {
    font-size: 3rem; /* 图标大小 */
    color: var(--primary); /* 图标颜色 */
    margin-bottom: 1.5rem; /* 和标题拉开距离 */
}
/* 卡片标题 */
.section-card h2 {
    font-size: 1.8rem;
    margin-bottom: 1rem;
    color: #1e293b;
}
/* 卡片描述文字 */
.section-card p {
    color: var(--light-text);
    line-height: 1.6; /* 行高，更易读 */
}
/* 响应式：手机端适配（屏幕小于768px时） */
@media (max-width: 768px) {
    .section-links {
        grid-template-columns: 1fr; /* 一行只显示1个卡片 */
    }
    .section-card {
        padding: 2rem 1.5rem; /* 减小内边距 */
    }
}
</style>
</head>
<body>
<div class="container">
    <!-- 头部标题 -->
    <div class="header">
        <h1><i class="fas fa-user-tie"></i> 吴梓锡 - 制造业HR实战</h1>
        <p>4年制造业HR经验 | 招聘/培训/员工关系/合规管理 实操沉淀</p>
    </div>

    <!-- 三大板块入口（核心） -->
    <div class="section-links">
        <!-- 1. 博客板块入口 → 指向 blog 文件夹的首页 -->
        <a href="blog/index.html" class="section-card">
            <i class="fas fa-pen-fancy"></i>
            <h2>HR职场博客</h2>
            <p>招聘技巧/培训体系/劳动法规<br>4年实战经验总结</p>
        </a>

        <!-- 2. 工作成果板块入口 → 指向 work 文件夹的首页 -->
        <a href="work/index.html" class="section-card">
            <i class="fas fa-chart-line"></i>
            <h2>工作成果展示</h2>
            <p>招聘优化/培训搭建/员工关系<br>量化成果+落地方法</p>
        </a>

        <!-- 3. 学习笔记板块入口 → 指向 note 文件夹的首页 -->
        <a href="note/index.html" class="section-card">
            <i class="fas fa-book-open"></i>
            <h2>HR学习笔记</h2>
            <p>工具模板/函数技巧/合规要点<br>可直接套用的实操笔记</p>
        </a>
    </div>
</div>
</body>
</html>
